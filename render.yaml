services:
  - type: web
    name: civicos-backend
    runtime: java
    buildCommand: cd backend && ./mvnw clean package -DskipTests
    startCommand: java -jar backend/target/civicos-backend-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DATABASE_URL
        value: "jdbc:postgresql://<NEON_HOST>/neondb?sslmode=require"
      - key: DATABASE_USERNAME
        value: "neondb_owner"
      - key: DATABASE_PASSWORD
        value: "<YOUR_NEON_PASSWORD>"
      - key: GEMINI_API_KEY
        value: "<YOUR_GEMINI_API_KEY>"
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx400m"
