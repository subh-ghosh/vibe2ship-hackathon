version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: civicos-postgres
    environment:
      POSTGRES_DB: civicos
      POSTGRES_USER: civicos
      POSTGRES_PASSWORD: civicos_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/seed_india.sql:/docker-entrypoint-initdb.d/seed_india.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicos"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: civicos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@civicos.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
