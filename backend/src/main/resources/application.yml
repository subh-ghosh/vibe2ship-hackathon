spring:
  application:
    name: civicos-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:civicos}
    password: ${DATABASE_PASSWORD:civicos_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  security:
    enabled: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info

civicos:
  cors:
    allowed-origins: "*"
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash

logging:
  level:
    com.civicos: INFO
    org.springframework.security: WARN
